<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Two-stop body gradient: lit upper-left to near-black lower-right -->
    <linearGradient id="body" x1="18%" y1="8%" x2="82%" y2="92%">
      <stop offset="0%"   stop-color="#5C2090"/>
      <stop offset="100%" stop-color="#180428"/>
    </linearGradient>

    <!-- Subtle shadow so prune lifts off dark background -->
    <filter id="shadow" x="-20%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10"
                    flood-color="#000000" flood-opacity="0.70"/>
    </filter>
  </defs>

  <!-- macOS rounded-rectangle background: dark charcoal -->
  <rect width="512" height="512" rx="115" ry="115" fill="#2A2A2A"/>

  <!-- ── Prune ──────────────────────────────────────────────────
       Slanted 22°, scaled 1.25× vs previous version to fill the icon.
       Centre nudged to (254, 282) to keep stem tip inside the squircle.
  ──────────────────────────────────────────────────────────── -->
  <g transform="translate(254, 282) rotate(22) scale(1.25)" filter="url(#shadow)">

    <!-- Body: elongated, with concave waist suggesting dehydrated skin -->
    <path d="M 0,-152
             C 44,-152 72,-108 70,-58
             C 76,-28 60,8 64,42
             C 68,80 56,118 40,138
             C 26,152 12,156 0,156
             C -12,156 -26,152 -40,138
             C -56,118 -68,80 -64,42
             C -60,8 -76,-28 -70,-58
             C -72,-108 -44,-152 0,-152 Z"
          fill="url(#body)"/>

    <!-- ── Longitudinal creases ── -->

    <!-- Central groove: dark trough + lighter ridge -->
    <path d="M -3,-148 C -5,-80 -6,-10 -5,52 C -4,100 -3,130 -2,153"
          fill="none" stroke="#090112" stroke-width="6"
          stroke-linecap="round" opacity="0.80"/>
    <path d="M 3,-148 C 5,-80 6,-10 5,52 C 4,100 3,130 2,153"
          fill="none" stroke="#7B42C0" stroke-width="2.5"
          stroke-linecap="round" opacity="0.45"/>

    <!-- Left secondary crease -->
    <path d="M -30,-96 C -34,-38 -35,18 -33,70 C -30,108 -27,133 -24,150"
          fill="none" stroke="#090112" stroke-width="3"
          stroke-linecap="round" opacity="0.32"/>

    <!-- Right secondary crease -->
    <path d="M 30,-96 C 34,-38 35,18 33,70 C 30,108 27,133 24,150"
          fill="none" stroke="#090112" stroke-width="3"
          stroke-linecap="round" opacity="0.32"/>

    <!-- Horizontal skin folds (dehydration wrinkles) -->
    <path d="M -52,25 C -40,18 -20,16 0,17 C 20,16 40,18 52,25"
          fill="none" stroke="#090112" stroke-width="2"
          stroke-linecap="round" opacity="0.18"/>
    <path d="M -58,-30 C -44,-38 -22,-41 0,-40 C 22,-41 44,-38 58,-30"
          fill="none" stroke="#090112" stroke-width="2"
          stroke-linecap="round" opacity="0.15"/>

    <!-- ── Stem ── -->
    <path d="M 2,-153 C 6,-175 16,-192 26,-205"
          fill="none" stroke="#6B3A18" stroke-width="11"
          stroke-linecap="round"/>

    <!-- ── Leaf ── -->
    <path d="M 17,-180 C 40,-204 68,-197 58,-172
             C 51,-155 28,-157 17,-180 Z"
          fill="#357518"/>
    <path d="M 17,-180 C 38,-180 54,-175 58,-172"
          fill="none" stroke="#245210" stroke-width="1.5"
          stroke-linecap="round" opacity="0.85"/>

  </g>
</svg>
